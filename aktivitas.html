    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava - Catat Aktivitas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container-small">
    <div class="card">
        <h1 style="text-align: center;">Catat Aktivitas Olahraga</h1>
        <p class="subtitle" style="text-align: center;">Isi data latihan kamu di sini</p>

        <form id="aktivitasForm">
            <div class="form-group">
                <label>Jenis Olahraga</label>
                <select id="olahraga" required>
                    <option value="">Pilih jenis olahraga</option>
                    <option value="Lari">🏃 Lari</option>
                    <option value="Bersepeda">🚴 Bersepeda</option>
                    <option value="Renang">🏊 Renang</option>
                    <option value="Yoga">🧘 Yoga</option>
                    <option value="Gym">💪 Gym/Fitness</option>
                </select>
            </div>
            <div class="form-group">
                <label>Durasi (menit)</label>
                <input type="number" id="durasi" placeholder="Contoh: 30" required min="1">
            </div>
            <div class="form-group">
                <label>Jarak (km) - opsional</label>
                <input type="number" id="jarak" placeholder="Contoh: 5" step="0.1">
            </div>
            <button type="submit" class="btn-primary btn-block">Simpan Aktivitas</button>
        </form>

        <div class="nav-links">
            <a href="index.html">Beranda</a>
            <a href="fasilitas.html">Fasilitas & Rute</a>
            <a href="laporan.html">Laporan Aktivitas</a>
        </div>
    </div>
</div>
