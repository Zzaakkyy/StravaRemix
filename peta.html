<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava - Peta & Rekomendasi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
<div class="header">
    <div class="logo">🏃 Strava</div>
    <div class="nav">
        <a href="index.html">Beranda</a>
        <a href="peta.html">Peta</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profil</a>
    </div>
</div>

<div class="extra-nav">
    <a href="aktivitas.html">📝 Catat Aktivitas</a>
    <a href="fasilitas.html">🗺️ Fasilitas & Rute</a>
    <a href="laporan.html">📊 Laporan Aktivitas</a>
</div>

<div class="container peta-container">
    <div class="map-area">
        <div id="mainMap" style="height: 600px; border-radius: 16px;"></div>
    </div>

    <div class="sidebar">
        <div class="widget">
            <h3>🔍 Filter Fasilitas</h3>
            <div class="filter-group">
                <label><input type="checkbox" class="filter-fasilitas" value="water"> 💧 Water Station</label>
                <label><input type="checkbox" class="filter-fasilitas" value="toilet"> 🚻 Toilet Umum</label>
                <label><input type="checkbox" class="filter-fasilitas" value="lampu"> 💡 Lampu Penerangan</label>
                <label><input type="checkbox" class="filter-fasilitas" value="parkir"> 🅿️ Area Parkir</label>
            </div>
            <button class="btn-primary" id="applyFilterBtn">Terapkan Filter</button>
        </div>

        <div class="widget">
            <h3>🏟️ Jenis Olahraga</h3>
            <div class="filter-group">
                <label><input type="checkbox" class="filter-olahraga" value="lari"> 🏃‍♂️ Lari</label>
                <label><input type="checkbox" class="filter-olahraga" value="sepeda"> 🚴‍♂️ Bersepeda</label>
                <label><input type="checkbox" class="filter-olahraga" value="tenis"> 🎾 Tenis</label>
                <label><input type="checkbox" class="filter-olahraga" value="padel"> 🏸 Padel</label>
                <label><input type="checkbox" class="filter-olahraga" value="basket"> 🏀 Basket</label>
                <label><input type="checkbox" class="filter-olahraga" value="gym"> 💪 Gym/Fitness</label>
            </div>
            <button class="btn-primary" id="applySportFilterBtn">Terapkan Filter</button>
        </div>

        <div class="widget">
            <h3>🔥 Rute Populer di Sekitarmu</h3>
            <ul class="route-list" id="routeList"></ul>
        </div>
    </div>
</div>

<button class="btn-float" id="btnBuatRute">+</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
